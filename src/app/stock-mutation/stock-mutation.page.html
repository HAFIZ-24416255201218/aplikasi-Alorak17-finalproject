<ion-content [fullscreen]="false" class="stock-mutation-content">
  <div class="stock-mutation-shell">
    <div class="stock-mutation-header">
      <div class="title-group">
        <div class="title-icon">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </div>
        <h1>Mutasi Stok</h1>
      </div>

      <button class="close-button" type="button" (click)="close()" aria-label="Tutup">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <form class="goods-form">
      <label class="field">
        <span>Pilih Barang</span>
        <div class="select-wrap">
          <select [(ngModel)]="form.selectedItem" name="selectedItem" (change)="onSelectItemChange()">
            <option value="" selected disabled>Pilih barang...</option>
            <option *ngFor="let item of inventoryItems" [value]="item.id" [disabled]="item.quantity <= 0">
              {{ item.name }} - {{ item.sku }} ({{ item.quantity }} {{ item.unit }})
            </option>
          </select>
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </label>

      <div class="mutation-preview" *ngIf="selectedItem as item">
        <div>
          <span>Stok Tersedia</span>
          <strong>{{ item.quantity }} {{ item.unit }}</strong>
        </div>
        <div>
          <span>Lokasi Saat Ini</span>
          <strong>{{ item.location }}</strong>
        </div>
      </div>

      <div class="primary-fields" aria-label="Input utama mutasi stok">
        <label class="field feature-field">
          <span>Jumlah</span>
          <input [(ngModel)]="form.quantity" name="quantity" type="number" min="1" placeholder="Masukkan jumlah" />
        </label>

        <label class="field feature-field">
          <span>Dari Lokasi</span>
          <div class="select-wrap">
            <select [(ngModel)]="form.fromLocation" name="fromLocation">
              <option value="" selected disabled>Pilih lokasi asal...</option>
              <option *ngFor="let location of sourceLocationOptions" [value]="location.value">
                {{ location.label }} - {{ location.quantity }} {{ selectedItem?.unit || 'unit' }}
              </option>
            </select>
            <ion-icon name="chevron-down-outline"></ion-icon>
          </div>
        </label>

        <label class="field feature-field">
          <span>Ke Lokasi</span>
          <div class="select-wrap">
            <select [(ngModel)]="form.toLocation" name="toLocation">
              <option value="" selected disabled>Pilih lokasi tujuan...</option>
              <option *ngFor="let location of destinationLocationOptions" [value]="location.value">{{ location.label }}</option>
            </select>
            <ion-icon name="chevron-down-outline"></ion-icon>
          </div>
        </label>
      </div>

      <label class="field">
        <span>Catatan (Opsional)</span>
        <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Tambahkan catatan..."></textarea>
      </label>
    </form>

    <button class="submit-button" type="button" (click)="submit()" [disabled]="isSubmitting">
      <span>{{ isSubmitting ? 'Menyimpan...' : 'Simpan Mutasi Stok' }}</span>
    </button>
  </div>
</ion-content>
