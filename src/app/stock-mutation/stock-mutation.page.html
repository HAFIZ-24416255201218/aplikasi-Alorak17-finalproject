<ion-content [fullscreen]="false" class="stock-mutation-content">
  <div class="stock-mutation-shell">
    <div class="stock-mutation-header">
      <div class="title-group">
        <button class="close-button" type="button" (click)="close()" aria-label="Tutup">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>
        <h1>Mutasi Stok</h1>
      </div>

      <button class="close-button" type="button" (click)="close()" aria-label="Tutup">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <form class="goods-form">
      <label class="field">
        <span>Nama Barang</span>
        <input [(ngModel)]="form.itemName" name="itemName" type="text" placeholder="Ketik nama barang"
          [disabled]="areItemDetailFieldsLocked" />
      </label>

      <label class="field">
        <span>Kode Barang</span>
        <div class="input-with-icon single">
          <input [(ngModel)]="form.itemCode" name="itemCode" type="text" placeholder="Ketik kode barang"
            [disabled]="isCodeFieldLocked" (ngModelChange)="scheduleExistingItemLookup($event, 'code')"
            (change)="lookupExistingItemFromCode()" (blur)="lookupExistingItemFromCode()" />
          <button class="scan-button" type="button" aria-label="Cari dari kode" [disabled]="isCodeFieldLocked"
            (click)="lookupExistingItemFromCode()">
            <ion-icon name="search-outline"></ion-icon>
          </button>
        </div>
      </label>

      <label class="field">
        <span>Barcode</span>
        <div class="input-with-icon single">
          <input [(ngModel)]="form.barcode" name="barcode" type="text" placeholder="Ketik barcode"
            [disabled]="isBarcodeFieldLocked" (ngModelChange)="scheduleExistingItemLookup($event, 'barcode')"
            (change)="lookupExistingItemFromBarcode()" (blur)="lookupExistingItemFromBarcode()" />
          <button class="scan-button" type="button" aria-label="Scan barcode dari kamera"
            [disabled]="isBarcodeFieldLocked" (click)="openBarcodeScanner()">
            <ion-icon name="camera-outline"></ion-icon>
          </button>
        </div>
        <small class="lookup-message" *ngIf="lookupMessage">{{ lookupMessage }}</small>
      </label>

      <div class="primary-fields" aria-label="Input utama mutasi stok">
        <label class="field feature-field">
          <span>Dari Lokasi</span>
          <app-searchable-select [(ngModel)]="form.fromLocation" name="fromLocation" [options]="sourceSelectOptions"
            placeholder="Pilih lokasi asal..." searchPlaceholder="Cari lokasi"
            emptyText="Lokasi tidak ditemukan"></app-searchable-select>
        </label>

        <label class="field feature-field">
          <span>Ke Lokasi</span>
          <app-searchable-select [(ngModel)]="form.toLocation" name="toLocation" [options]="destinationSelectOptions"
            placeholder="Pilih lokasi tujuan..." searchPlaceholder="Cari lokasi"
            emptyText="Lokasi tidak ditemukan"></app-searchable-select>
        </label>

        <label class="field feature-field">
          <span>Jumlah</span>
          <input [(ngModel)]="form.quantity" name="quantity" type="number" min="1" placeholder="Masukkan jumlah" />
        </label>
      </div>

      <label class="field">
        <span>Kategori</span>
        <input [(ngModel)]="form.category" name="category" type="text" placeholder="Kategori barang"
          [disabled]="areItemDetailFieldsLocked" />
      </label>

      <label class="field">
        <span>Unit</span>
        <input [(ngModel)]="form.unit" name="unit" type="text" [disabled]="areItemDetailFieldsLocked" />
      </label>

      <div class="threshold-grid">
        <label class="field">
          <span>Batas Minimum Stok</span>
          <input [(ngModel)]="form.minThreshold" name="minThreshold" type="number" min="0" placeholder="50"
            [disabled]="areItemDetailFieldsLocked" />
        </label>

        <label class="field">
          <span>Batas Stok Sedang</span>
          <input [(ngModel)]="form.mediumThreshold" name="mediumThreshold" type="number" min="0" placeholder="150"
            [disabled]="areItemDetailFieldsLocked" />
        </label>
      </div>

      <label class="field">
        <span>Catatan (Opsional)</span>
        <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Tambahkan catatan..."></textarea>
      </label>
    </form>

    <button class="submit-button" type="button" (click)="submit()" [disabled]="isSubmitting">
      <span>{{ isSubmitting ? 'Menyimpan...' : 'Simpan Mutasi Stok' }}</span>
    </button>
  </div>
</ion-content>

<app-barcode-scanner-popup *ngIf="isScannerOpen" (scanned)="applyScannedBarcode($event)"
  (closed)="closeBarcodeScanner()"></app-barcode-scanner-popup>
