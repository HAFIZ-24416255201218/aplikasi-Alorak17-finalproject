<ion-content>
  <div class="login-container">
    <div class="login-ambient" aria-hidden="true"></div>

    <div class="form-section">
      <div class="logo-section">
        <div class="logo-box">
          <img src="assets/alorackweb.png" alt="Alorack Operator Logo" class="logo-image" />
        </div>
        <div class="brand-copy">
          <h1 class="app-title">Alorack Operator</h1>
          <p class="app-subtitle">Akses gudang mobile</p>
        </div>
      </div>

      <form [formGroup]="loginForm">
        <div *ngIf="errorMessage" class="error-message">
          <ion-icon name="alert-circle-outline"></ion-icon>
          {{ errorMessage }}
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input id="email" type="email" formControlName="email" class="form-input" placeholder="Masukkan email Anda"
            autocomplete="email" />
          <div *ngIf="
              loginForm.get('email')?.invalid &&
              loginForm.get('email')?.touched
            " class="error-text">
            Email tidak valid
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="password-input-wrapper">
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
              class="form-input" placeholder="Masukkan password Anda" autocomplete="current-password" />
            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()"
              *ngIf="loginForm.get('password')?.value">
              <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
            </button>
          </div>
          <div *ngIf="
              loginForm.get('password')?.invalid &&
              loginForm.get('password')?.touched
            " class="error-text">
            Password minimal 6 karakter
          </div>
        </div>

        <button type="button" class="sign-in-button" (click)="onLogin()" [disabled]="loginForm.invalid || loading">
          <ion-spinner *ngIf="loading" name="crescent" class="button-spinner"></ion-spinner>
          <span *ngIf="!loading">Masuk</span>
          <span *ngIf="loading">Memuat...</span>
        </button>
      </form>
    </div>
  </div>
</ion-content>
