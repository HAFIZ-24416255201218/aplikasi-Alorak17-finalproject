<ion-content [fullscreen]="false" class="goods-in-content">
  <div class="goods-in-shell">
    <div class="goods-in-header">
      <div class="title-group">
        <div class="title-icon">
          <ion-icon name="arrow-down-outline"></ion-icon>
        </div>
        <h1>Barang Masuk</h1>
      </div>

      <button class="close-button" type="button" (click)="close()" aria-label="Tutup">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <div class="summary-card">
      <div>
        <span>Kode masuk otomatis</span>
        <strong>{{ form.itemCode }}</strong>
      </div>
      <ion-icon name="sparkles-outline"></ion-icon>
    </div>

    <form class="goods-form">
      <label class="field">
        <span>Nama Barang</span>
        <input [(ngModel)]="form.itemName" name="itemName" type="text" placeholder="Ketik nama barang" />
      </label>

      <label class="field">
        <span>Kode Barang</span>
        <div class="input-with-icon single">
          <input
            [(ngModel)]="form.itemCode"
            name="itemCode"
            type="text"
            placeholder="Ketik atau buat kode barang"
            (ngModelChange)="scheduleExistingItemLookup($event, 'code')"
            (change)="lookupExistingItemFromCode()"
            (blur)="lookupExistingItemFromCode()"
          />
          <button class="scan-button" type="button" (click)="generateItemCode()" aria-label="Buat kode baru">
            <ion-icon name="refresh-outline"></ion-icon>
          </button>
        </div>
      </label>

      <label class="field">
        <span>Barcode</span>
        <div class="input-with-icon single">
          <input
            [(ngModel)]="form.barcode"
            name="barcode"
            type="text"
            placeholder="Ketik atau scan barcode"
            (ngModelChange)="scheduleExistingItemLookup($event, 'barcode')"
            (change)="lookupExistingItemFromBarcode()"
            (blur)="lookupExistingItemFromBarcode()"
          />
          <button class="scan-button" type="button" (click)="openBarcodeScanner()" aria-label="Scan barcode dari kamera">
            <ion-icon name="camera-outline"></ion-icon>
          </button>
        </div>
        <small class="lookup-message" *ngIf="barcodeLookupMessage">{{ barcodeLookupMessage }}</small>
      </label>

      <label class="field">
        <span>Kategori</span>
        <div class="select-wrap">
          <select [(ngModel)]="form.category" name="category">
            <option value="" disabled>Pilih kategori barang</option>
            <option *ngFor="let category of categoryOptions" [value]="category.name">{{ category.name }}</option>
            <option *ngIf="!categoryOptions.length" value="" disabled>Kategori belum tersedia dari server</option>
          </select>
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </label>

      <label class="field">
        <span>Unit</span>
        <input [(ngModel)]="form.unit" name="unit" type="text" />
      </label>

      <div class="threshold-grid">
        <label class="field">
          <span>Batas Minimum Stok</span>
          <input [(ngModel)]="form.minThreshold" name="minThreshold" type="number" min="0" placeholder="50" />
        </label>

        <label class="field">
          <span>Batas Stok Sedang</span>
          <input [(ngModel)]="form.mediumThreshold" name="mediumThreshold" type="number" min="0" placeholder="150" />
        </label>
      </div>



      <label class="field">
        <span>Lokasi Tujuan</span>
        <div class="select-wrap">
          <select [(ngModel)]="form.destLocation" name="destLocation">
            <option value="" disabled>Pilih lokasi tujuan</option>
            <option *ngFor="let location of locationsList" [value]="location.id">{{ location.display_name || location.name }}</option>
          </select>
          <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
      </label>

      <label class="field">
        <span>Jumlah</span>
        <input [(ngModel)]="form.quantity" name="quantity" type="number" placeholder="Masukkan jumlah" />
      </label>

      <label class="field">
        <span>Catatan (Opsional)</span>
        <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Tambahkan catatan..."></textarea>
      </label>
    </form>

    <button class="submit-button" type="button" (click)="submit()" [disabled]="isSubmitting">
      <span>{{ isSubmitting ? 'Menyimpan...' : 'Simpan Barang Masuk' }}</span>
    </button>
  </div>
</ion-content>

<div class="scanner-overlay" *ngIf="isScannerOpen">
  <div class="scanner-dialog">
    <div class="scanner-top">
      <strong>Pindai Barcode</strong>
      <button type="button" class="scanner-close" (click)="stopScanner()" aria-label="Tutup scanner">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <div class="scanner-preview">
      <video #scannerVideo autoplay playsinline muted></video>
      <div class="scanner-target" aria-hidden="true">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>
    </div>
    <p>{{ scanMessage }}</p>
  </div>
</div>
