<ion-content [fullscreen]="false" class="dashboard-content">
  <main class="dashboard-shell">
    <header class="dashboard-header">
      <div>
        <h1>Dashboard</h1>
        <p>Halo, {{ username }}</p>
        <span>Selamat datang di Alorack17</span>
      </div>

      <button class="notification-button" type="button" aria-label="Notifikasi" (click)="goToNotifications(); $event.stopPropagation()">
        <ion-icon name="notifications-outline"></ion-icon>
        <span class="notification-dot" *ngIf="unreadCount > 0"></span>
      </button>
    </header>

    <section class="stats-grid" aria-label="Statistik dashboard">
      <article class="stat-card" *ngFor="let stat of statistics" [ngClass]="stat.theme">
        <span>{{ stat.label }}</span>
        <strong>{{ stat.value }}</strong>
      </article>
    </section>

    <section class="summary-card">
      <h2>Ringkasan Stok</h2>
      <div class="summary-body">
        <div class="stock-pie" [style.background]="pieGradient" aria-hidden="true">
          <span></span>
        </div>

        <div class="summary-legend">
          <div class="legend-row" *ngFor="let item of stockSummaryItems">
            <span class="legend-dot" [style.background]="item.color"></span>
            <span class="legend-name">{{ item.label }}</span>
            <strong>{{ item.percent }}%</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="recent-activity-section">
      <div class="section-heading">
        <h2>Aktivitas Terbaru</h2>
        <button type="button" (click)="goToHistory(); $event.stopPropagation()" aria-label="Lihat semua aktivitas">
          <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>
      </div>

      <div class="activity-list" *ngIf="recentActivities.length > 0; else emptyActivities">
        <article class="activity-item" *ngFor="let activity of recentActivities">
          <div class="activity-icon">
            <ion-icon [name]="activity.icon"></ion-icon>
          </div>
          <div class="activity-copy">
            <strong>{{ activity.typeLabel }}</strong>
            <span>{{ activity.name }}</span>
          </div>
          <time>{{ activity.time }}</time>
        </article>
      </div>

      <ng-template #emptyActivities>
        <div class="empty-activity">
          <ion-icon name="file-tray-outline"></ion-icon>
          <span>Belum ada aktivitas terbaru</span>
        </div>
      </ng-template>
    </section>
  </main>
</ion-content>

<app-bottom-nav active="dashboard"></app-bottom-nav>
