<ion-content [fullscreen]="false" class="goods-out-content">
  <div class="goods-out-shell">
    <div class="goods-out-header">
      <div class="title-group">
        <div class="title-icon">
          <ion-icon name="arrow-up-outline"></ion-icon>
        </div>
        <h1>Barang Keluar</h1>
      </div>

      <button class="close-button" type="button" (click)="close()" aria-label="Tutup">
        <ion-icon name="close-outline"></ion-icon>
      </button>
    </div>

    <form class="goods-form">
      <label class="field">
        <span>Pilih Barang</span>
        <app-searchable-select
          [(ngModel)]="form.selectedItem"
          name="selectedItem"
          [options]="itemOptions"
          placeholder="Pilih barang..."
          searchPlaceholder="Cari barang"
          emptyText="Barang tidak ditemukan"
          (selectionChange)="onSelectItemChange()"
        ></app-searchable-select>
      </label>

      <div class="release-preview" *ngIf="selectedItem as item">
        <div class="preview-icon">
          <ion-icon name="cube-outline"></ion-icon>
        </div>
        <div>
          <h2>{{ item.name }}</h2>
          <p>{{ item.sku }} - {{ item.location }}</p>
        </div>
        <strong>{{ item.quantity }} {{ item.unit }}</strong>
      </div>

      <div class="primary-fields" aria-label="Input utama barang keluar">
        <label class="field feature-field">
          <span>Jumlah</span>
          <input [(ngModel)]="form.quantity" name="quantity" type="number" placeholder="Masukkan jumlah" />
        </label>

        <label class="field feature-field">
          <span>Dari Lokasi</span>
          <app-searchable-select
            [(ngModel)]="form.fromLocation"
            name="fromLocation"
            [options]="sourceSelectOptions"
            placeholder="Pilih lokasi asal..."
            searchPlaceholder="Cari lokasi"
            emptyText="Lokasi tidak ditemukan"
          ></app-searchable-select>
        </label>
      </div>

      <label class="field">
        <span>Catatan (Opsional)</span>
        <textarea [(ngModel)]="form.notes" name="notes" rows="3" placeholder="Tambahkan catatan..."></textarea>
      </label>
    </form>

    <button class="submit-button" type="button" (click)="submit()" [disabled]="isSubmitting">
      <span>{{ isSubmitting ? 'Menyimpan...' : 'Simpan Barang Keluar' }}</span>
    </button>
  </div>
</ion-content>
