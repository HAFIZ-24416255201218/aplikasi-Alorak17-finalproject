<ion-header [translucent]="true" class="custom-header">
  <ion-toolbar class="custom-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-button">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Ubah Produk</ion-title>
    <div class="header-decoration"></div>
  </ion-toolbar>
</ion-header>

<ion-content class="edit-content" *ngIf="item">
  <div class="edit-shell">
    <div class="form-header">
      <h2>Perbarui Informasi Produk</h2>
      <p>Lengkapi semua detail produk di bawah ini</p>
    </div>

    <form class="edit-form">
      <div class="form-section">
        <h3 class="section-title">
          <ion-icon name="cube-outline"></ion-icon>
          Informasi Dasar
        </h3>

        <div class="form-group">
          <label>
            <ion-icon name="pricetag-outline"></ion-icon>
            Nama Produk
          </label>
          <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Masukkan nama produk"
            class="form-input readonly-input" readonly />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="barcode-outline"></ion-icon>
            Kode Unik
          </label>
          <input type="text" [(ngModel)]="formData.sku" name="sku" placeholder="Kode unik produk"
            class="form-input readonly-input" readonly />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="scan-outline"></ion-icon>
            Kode Batang
          </label>
          <input type="text" [value]="formData.barcode || '-'" name="barcode" class="form-input readonly-input"
            readonly />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="albums-outline"></ion-icon>
            Kategori
          </label>
          <input type="text" [(ngModel)]="formData.category" name="category" placeholder="Masukkan kategori"
            class="form-input readonly-input" readonly />
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">
          <ion-icon name="settings-outline"></ion-icon>
          Pengaturan Stok
        </h3>

        <div class="form-row">
          <div class="form-group">
            <label>
              <ion-icon name="settings-outline"></ion-icon>
              Unit
            </label>
            <input type="text" [(ngModel)]="formData.unit" name="unit" placeholder="pcs, box, dll"
              class="form-input readonly-input" readonly />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              <ion-icon name="alert-circle-outline"></ion-icon>
              Batas Minimum Stok
            </label>
            <input type="number" [(ngModel)]="formData.minThreshold" name="minThreshold" placeholder="Batas minimum"
              class="form-input" />
          </div>

          <div class="form-group">
            <label>
              <ion-icon name="checkmark-circle-outline"></ion-icon>
              Batas Stok Sedang
            </label>
            <input type="number" [(ngModel)]="formData.mediumThreshold" name="mediumThreshold"
              placeholder="Batas sedang" class="form-input" />
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="button-group">
    <button class="btn btn-secondary" type="button" (click)="goBack()" [disabled]="isSaving">
      <ion-icon name="close-outline"></ion-icon>
      Batal
    </button>
    <button class="btn btn-primary" type="button" (click)="saveChanges()" [disabled]="isSaving">
      <ion-icon *ngIf="!isSaving" name="checkmark-done-outline"></ion-icon>
      <ion-icon *ngIf="isSaving" name="hourglass-outline"></ion-icon>
      <span *ngIf="!isSaving">Simpan Perubahan</span>
      <span *ngIf="isSaving">Menyimpan...</span>
    </button>
  </div>
</ion-content>

<app-bottom-nav active="inventory"></app-bottom-nav>
