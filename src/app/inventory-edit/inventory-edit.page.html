<ion-header [translucent]="true" class="custom-header">
  <ion-toolbar class="custom-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="back-button">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">Ubah Produk</ion-title>
    <div class="header-decoration"></div>
  </ion-toolbar>
</ion-header>

<ion-content class="edit-content" *ngIf="item">
  <div class="edit-shell">
    <div class="form-header">
      <h2>Perbarui Informasi Produk</h2>
      <p>Lengkapi semua detail produk di bawah ini</p>
    </div>

    <form class="edit-form">
      <div class="form-section">
        <h3 class="section-title">
          <ion-icon name="cube-outline"></ion-icon>
          Informasi Dasar
        </h3>
        
        <div class="form-group">
          <label>
            <ion-icon name="image-outline"></ion-icon>
            Foto Produk
          </label>
          <input #photoInput class="photo-input" type="file" accept="image/*" (change)="onPhotoSelected($event)" />
          <button class="photo-picker" type="button" (click)="photoInput.click()">
            <div class="photo-preview" [class.has-photo]="formData.imageData">
              <img *ngIf="formData.imageData" [src]="formData.imageData" alt="Foto produk {{ formData.name || item.name }}" />
              <ion-icon *ngIf="!formData.imageData" name="camera-outline"></ion-icon>
            </div>
            <div class="photo-copy">
              <strong>{{ formData.imageData ? 'Ganti foto produk' : 'Tambah foto produk' }}</strong>
              <span>JPG, PNG, atau foto dari galeri</span>
            </div>
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </button>
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="pricetag-outline"></ion-icon>
            Nama Produk
          </label>
          <input
            type="text"
            [(ngModel)]="formData.name"
            name="name"
            placeholder="Masukkan nama produk"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="barcode-outline"></ion-icon>
            Barcode
          </label>
          <input
            type="text"
            [(ngModel)]="formData.sku"
            name="sku"
            placeholder="Masukkan SKU"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="albums-outline"></ion-icon>
            Kategori
          </label>
          <input
            type="text"
            [(ngModel)]="formData.category"
            name="category"
            placeholder="Masukkan kategori"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">
          <ion-icon name="map-outline"></ion-icon>
          Lokasi & Stok
        </h3>

        <div class="form-group">
          <label>
            <ion-icon name="location-outline"></ion-icon>
            Lokasi
          </label>
          <input
            type="text"
            [(ngModel)]="formData.location"
            name="location"
            placeholder="Masukkan lokasi"
            class="form-input"
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              <ion-icon name="layers-outline"></ion-icon>
              Jumlah Stok
            </label>
            <input
              type="number"
              [(ngModel)]="formData.quantity"
              name="quantity"
              placeholder="Jumlah"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label>
              <ion-icon name="settings-outline"></ion-icon>
              Unit
            </label>
            <input
              type="text"
              [(ngModel)]="formData.unit"
              name="unit"
              placeholder="pcs, box, dll"
              class="form-input"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>
              <ion-icon name="alert-circle-outline"></ion-icon>
              Batas Minimum Stok
            </label>
            <input
              type="number"
              [(ngModel)]="formData.minThreshold"
              name="minThreshold"
              placeholder="Batas minimum"
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label>
              <ion-icon name="checkmark-circle-outline"></ion-icon>
              Batas Stok Sedang
            </label>
            <input
              type="number"
              [(ngModel)]="formData.mediumThreshold"
              name="mediumThreshold"
              placeholder="Batas sedang"
              class="form-input"
            />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">
          <ion-icon name="calendar-outline"></ion-icon>
          Kadaluarsa & Catatan
        </h3>

        <div class="form-group">
          <label>
            <ion-icon name="calendar-outline"></ion-icon>
            Tanggal Kadaluarsa
          </label>
          <input
            type="date"
            [(ngModel)]="formData.expirationDate"
            name="expirationDate"
            class="form-input date-input"
          />
        </div>

        <div class="form-group">
          <label>
            <ion-icon name="document-text-outline"></ion-icon>
            Catatan
          </label>
          <textarea
            [(ngModel)]="formData.notes"
            name="notes"
            placeholder="Masukkan catatan tambahan (opsional)"
            class="form-input"
            rows="3"
          ></textarea>
        </div>
      </div>
    </form>
  </div>

  <div class="button-group">
    <button class="btn btn-secondary" type="button" (click)="goBack()" [disabled]="isSaving">
      <ion-icon name="close-outline"></ion-icon>
      Batal
    </button>
    <button class="btn btn-primary" type="button" (click)="saveChanges()" [disabled]="isSaving">
      <ion-icon *ngIf="!isSaving" name="checkmark-done-outline"></ion-icon>
      <ion-icon *ngIf="isSaving" name="hourglass-outline"></ion-icon>
      <span *ngIf="!isSaving">Simpan Perubahan</span>
      <span *ngIf="isSaving">Menyimpan...</span>
    </button>
  </div>
</ion-content>

<ion-footer class="footer-nav">
  <div class="nav-wrapper">
    <div class="nav-item" (click)="goToHome()">
      <ion-icon name="home-outline"></ion-icon>
      <span>Dashboard</span>
    </div>
    <div class="nav-item active">
      <ion-icon name="layers-outline"></ion-icon>
      <span>Inventory</span>
    </div>
    <div class="nav-item" (click)="goToHistory()">
      <ion-icon name="time-outline"></ion-icon>
      <span>History</span>
    </div>
    <div class="nav-item" (click)="goToProfile()">
      <ion-icon name="person-outline"></ion-icon>
      <span>Profile</span>
    </div>
  </div>
</ion-footer>
